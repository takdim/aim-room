{% extends "base.html" %}

{% block title %}Login - SIKARAENG{% endblock %}

{% block content %}
  <div class="login-container">
    <div class="login-card">
      <div class="login-header">
        <div class="brand-icon-login">
          <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="12" cy="12" r="1"></circle>
            <path d="M12 1v6m0 6v6"></path>
            <path d="M4.22 4.22l4.24 4.24m3.08 3.08l4.24 4.24"></path>
            <path d="M1 12h6m6 0h6"></path>
            <path d="M4.22 19.78l4.24-4.24m3.08-3.08l4.24-4.24"></path>
          </svg>
        </div>
        <h1 class="login-title">SIKARAENG</h1>
        <p class="login-subtitle">Sistem Informasi Kegiatan & Ruang</p>
      </div>

      <form method="post" class="login-form">
        <div class="form-group">
          <label for="email" class="form-label">Email</label>
          <input 
            id="email" 
            name="email" 
            type="email" 
            class="form-input"
            placeholder="Masukkan email Anda"
            required 
          />
        </div>

        <div class="form-group">
          <label for="password" class="form-label">Password</label>
          <input 
            id="password" 
            name="password" 
            type="password" 
            class="form-input"
            placeholder="Masukkan password Anda"
            required 
          />
        </div>

        <button type="submit" class="btn btn-login">Masuk</button>
      </form>

      <div class="login-footer">
        <p>Belum punya akun? Hubungi administrator.</p>
      </div>
    </div>
  </div>

  <style>
    .login-container {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: calc(100vh - 60px);
      background: linear-gradient(135deg, #f3f4f6 0%, #e5e7eb 100%);
      padding: 16px;
    }

    .login-card {
      background: #fff;
      border-radius: 12px;
      box-shadow: 0 4px 6px rgba(0, 0, 0, 0.07), 0 10px 20px rgba(0, 0, 0, 0.05);
      padding: 40px;
      width: 100%;
      max-width: 400px;
      border: 1px solid #e5e7eb;
    }

    .login-header {
      text-align: center;
      margin-bottom: 32px;
    }

    .brand-icon-login {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 56px;
      height: 56px;
      background: #dbeafe;
      border-radius: 12px;
      color: #2563eb;
      margin-bottom: 16px;
    }

    .login-title {
      margin: 0 0 8px;
      font-size: 1.5rem;
      font-weight: 700;
      color: var(--text);
    }

    .login-subtitle {
      margin: 0;
      font-size: 0.95rem;
      color: var(--muted);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: 16px;
      margin-bottom: 24px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .form-label {
      font-weight: 600;
      font-size: 0.95rem;
      color: var(--text);
    }

    .form-input {
      padding: 10px 14px;
      border: 1px solid #d1d5db;
      border-radius: 8px;
      font-size: 1rem;
      color: var(--text);
      background: #fff;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .form-input:focus {
      outline: none;
      border-color: #2563eb;
      box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
    }

    .form-input::placeholder {
      color: #9ca3af;
    }

    .btn-login {
      padding: 12px 16px;
      font-size: 1rem;
      font-weight: 600;
      background: #2563eb;
      color: #fff;
      border: 0;
      border-radius: 8px;
      cursor: pointer;
      transition: background-color 0.2s;
      width: 100%;
    }

    .btn-login:hover {
      background: #1d4ed8;
    }

    .btn-login:active {
      background: #1e40af;
    }

    .login-footer {
      text-align: center;
      padding-top: 16px;
      border-top: 1px solid #e5e7eb;
    }

    .login-footer p {
      margin: 0;
      font-size: 0.9rem;
      color: var(--muted);
    }

    @media (max-width: 640px) {
      .login-card {
        padding: 28px;
      }

      .login-title {
        font-size: 1.3rem;
      }

      .brand-icon-login {
        width: 48px;
        height: 48px;
      }
    }
  </style>
{% endblock %}
